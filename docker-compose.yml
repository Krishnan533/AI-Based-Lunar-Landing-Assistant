version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: lunar_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: lunar_landing
    volumes:
      - mongo_data:/data/db

  # 2. Python AI Service (YOLOv8 + OpenCV + TensorFlow)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: lunar_ai_service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0

  # 3. Node.js Express Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lunar_backend_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/lunar_landing
      - JWT_SECRET=production_super_secret_jwt_key_987654321
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - ai-service

  # 4. React 18 + Vite 3D Cosmic Dark Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lunar_frontend_app
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
