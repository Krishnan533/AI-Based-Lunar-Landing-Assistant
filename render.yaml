services:
  # 1. Python AI Service
  - type: web
    name: lunar-ai-service
    runtime: python
    plan: free
    region: singapore
    rootDir: ai-service
    buildCommand: pip install --no-cache-dir -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6

  # 2. Node.js Backend API
  - type: web
    name: lunar-backend-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.1

      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: lunar-ai-service
          property: host

  # 3. React Frontend
  - type: web
    name: lunar-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: NODE_VERSION
        value: 20.11.1

      - key: CI
        value: "false"

      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: lunar-backend-api
          property: host

    routes:
      - type: rewrite
        source: /*
        destination: /index.html