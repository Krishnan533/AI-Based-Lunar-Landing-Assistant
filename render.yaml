services:
  # 1. Python AI Service
  - type: web
    name: lunar-ai-service
    runtime: python
    plan: free
    region: singapore
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6

  # 2. Node.js Backend API
  - type: web
    name: lunar-backend-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: lunar-ai-service
          property: hostport

      # Uncomment and replace with your MongoDB Atlas URI
      # - key: MONGO_URI
      #   value: mongodb+srv://username:password@cluster.mongodb.net/lunar_landing

  # 3. React Frontend
  - type: static
    name: lunar-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: lunar-backend-api
          property: hostport

    routes:
      - type: rewrite
        source: /*
        destination: /index.html