# Render Deployment Blueprint for AI-Based Lunar Landing Assistant
services:
  # 1. Python AI Microservice (FastAPI + YOLOv8 + OpenCV + TensorFlow)
  - type: web
    name: lunar-ai-service
    env: python
    region: singapore
    plan: free
    buildCommand: "cd ai-service && pip install -r requirements.txt"
    startCommand: "cd ai-service && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6

  # 2. Node.js Express REST API (5 MongoDB Collections + JWT Auth)
  - type: web
    name: lunar-backend-api
    env: node
    region: singapore
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        value: https://lunar-ai-service.onrender.com

  # 3. React 18 + Vite 3D Cosmic Dark Frontend
  - type: web
    name: lunar-frontend
    env: static
    region: singapore
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://lunar-backend-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
